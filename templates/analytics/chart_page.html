{% extends "base.html" %}
{% block title %}{{ module.title }} - Analytics{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('analytics.analytics_hub') }}">Analytics</a></li>
        <li class="breadcrumb-item active">{{ module.title }}</li>
    </ol>
</nav>

<div class="card shadow-sm p-4">
    <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
        <div>
            <h2 class="dashboard-title mb-1">{{ module.title }}</h2>
            <p class="text-muted mb-0">{{ module.description }}</p>
        </div>
        {% if module.live %}
        <span class="badge bg-danger fs-6"><i class="bi bi-broadcast"></i> Auto-refresh: 10s</span>
        {% endif %}
    </div>
    <canvas id="analyticsChart" height="100"></canvas>
</div>

<div id="chartMeta" class="mt-3 text-muted small"
     data-api="{{ module.api }}"
     data-type="{{ module.chart_type }}"
     data-live="{{ 'true' if module.live else 'false' }}">
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/analytics-chart.js') }}"></script>
{% endblock %}
