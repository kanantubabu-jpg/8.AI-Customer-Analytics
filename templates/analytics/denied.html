{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div class="card shadow-sm p-5 text-center">
    <i class="bi bi-shield-x text-danger fs-1"></i>
    <h3 class="mt-3">Access Denied</h3>
    <p class="text-muted">Your current role cannot view <strong>{{ module.title }}</strong>.</p>
    <a href="{{ url_for('analytics.analytics_hub') }}" class="btn btn-primary">Back to Analytics Hub</a>
</div>
{% endblock %}
